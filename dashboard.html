<!DOCTYPE html> <html lang="vi"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Dashboard ATVSV - Idemitsu</title> <script src="https://cdn.tailwindcss.com"></script> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <script> tailwind.config = { theme:{ extend:{ colors:{ brandRed:"#ed1c24" } } } } </script> </head> <body class="bg-slate-50 text-slate-800 min-h-screen"> <div id="pageLoader" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"> <div class="bg-white rounded-xl p-6 shadow-lg flex flex-col items-center"> <div class="w-10 h-10 border-4 border-slate-200 border-t-brandRed rounded-full animate-spin"></div> <p class="mt-4 text-sm">Đang tải Dashboard...</p> </div> </div> <header class="bg-white shadow"> <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center"> <h1 class="font-bold text-xl">ATVSV Dashboard</h1> <div class="flex gap-3">

</td> </tr> </tbody> </table> </section> </main> <div id="imageModal" class="fixed inset-0 hidden items-center justify-center bg-black/70"> <img id="imagePreview" class="max-h-[80vh] rounded-lg"> </div> <script type="module"> import { auth, db, onAuthStateChanged, signOut, doc, getDoc, collection, getDocs } from "./firebase-config.js"; let submissions=[]; document.addEventListener("DOMContentLoaded",init); function init(){ document.getElementById("logoutBtn").addEventListener("click",logout); observeAuth(); } function observeAuth(){ onAuthStateChanged(auth,async(user)=>{ if(!user){ location.href="./index.html"; return; } const userDoc = await getDoc(doc(db,"users",user.uid)); if(!userDoc.exists()){ alert("Không tìm thấy hồ sơ user"); return; } const profile = userDoc.data(); if(!["admin","manager"].includes(profile.role)){ alert("Bạn không có quyền truy cập dashboard"); location.href="./index.html"; return; } await loadDashboard(); }); } async function loadDashboard(){ const snap = await getDocs(collection(db,"submissions")); submissions = snap.docs.map(d=>d.data()); renderStats(); renderTrend(); renderNgTable(); document.getElementById("pageLoader").style.display="none"; } function renderStats(){ let ok=0; let ng=0; let na=0; submissions.forEach(s=>{ (s.answers||[]).forEach(a=>{ if(a.result==="OK") ok++; if(a.result==="NG") ng++; if(a.result==="N/A") na++; }); }); document.getElementById("statTotalSubmissions").textContent=submissions.length; document.getElementById("statTotalOk").textContent=ok; document.getElementById("statTotalNg").textContent=ng; document.getElementById("statTotalNa").textContent=na; } function renderTrend(){ const map={}; submissions.forEach(s=>{ const date=(s.createdAtText||"").split(" ")[0]; if(!date) return; if(!map[date]) map[date]=0; map[date]++; }); const labels=Object.keys(map).slice(-7); const data=labels.map(l=>map[l]); new Chart( document.getElementById("trendChart"), { type:"line", data:{ labels, datasets:[{ label:"Báo cáo", data, borderColor:"#ed1c24", tension:.3 }] }, options:{ plugins:{ legend:{display:false} } } } ); } function renderNgTable(){ const tbody=document.getElementById("ngTableBody"); let rows=""; submissions.forEach(s=>{ (s.answers||[]).forEach(a=>{ if(a.result!=="NG") return; const img = a.images?.[0]?.url || ""; rows+=` <tr class="border-b"> <td class="p-2">${s.submissionId}</td> <td class="p-2">${s.hoTen}</td> <td class="p-2">${a.question}</td> <td class="p-2">${a.note||""}</td> <td class="p-2 text-center"> ${img ? `<img src="${img}" class="h-10 cursor-pointer" onclick="openImage('${img}')">` : "-"} </td> <td class="p-2 text-center text-red-600 font-semibold"> NG </td> </tr> `; }); }); tbody.innerHTML = rows || `<tr><td colspan="6" class="text-center py-6 text-gray-400">Không có lỗi NG</td></tr>`; } window.openImage = function(src){ const modal=document.getElementById("imageModal"); document.getElementById("imagePreview").src=src; modal.classList.remove("hidden"); modal.onclick=()=>modal.classList.add("hidden"); } async function logout(){ await signOut(auth); location.href="./index.html"; } </script> </body> </html> :::
