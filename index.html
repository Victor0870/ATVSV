<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Checksheet ATVSV - Idemitsu</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="pageLoader" class="page-loader hidden">
    <div class="loader-card">
      <div class="spinner"></div>
      <p id="pageLoaderText">Đang tải dữ liệu...</p>
    </div>
  </div>

  <main class="app-shell">
    <!-- Màn hình đăng nhập -->
    <section id="loginScreen" class="screen auth-screen">
      <div class="auth-card">
        <div class="brand-line"></div>
        <h1 class="auth-title">E-Checksheet ATVSV</h1>
        <p class="auth-subtitle">Idemitsu Lubricants Vietnam</p>

        <form id="loginForm" class="form-stack">
          <div class="form-group">
            <label for="emailInput">Email đăng nhập</label>
            <input
              type="email"
              id="emailInput"
              placeholder="Nhập email"
              autocomplete="email"
              required
            >
          </div>

          <div class="form-group">
            <label for="passwordInput">Mật khẩu</label>
            <div class="password-wrap">
              <input
                type="password"
                id="passwordInput"
                placeholder="Nhập mật khẩu"
                autocomplete="current-password"
                required
              >
              <button type="button" id="togglePasswordBtn" class="ghost-btn small-btn">Hiện</button>
            </div>
          </div>

          <button type="submit" id="loginBtn" class="primary-btn full-btn">Đăng nhập</button>
        </form>

        <div class="note-box">
          <strong>Lưu ý:</strong>
          <span>Hiện tại chưa thể tự tạo TK, vui lòng liên hệ Victor để tạo</span>
        </div>
      </div>
    </section>

    <!-- Màn hình checklist -->
    <section id="checklistScreen" class="screen hidden">
      <div class="topbar">
        <div class="topbar-left">
          <span class="topbar-tag">E-Checksheet nội bộ</span>
        </div>
        <div class="topbar-right">
          <a id="reportLink" href="./report.html" class="ghost-btn hidden">Xem báo cáo</a>
          <button type="button" id="logoutBtn" class="ghost-btn">Đăng xuất</button>
        </div>
      </div>

      <header class="hero-card">
        <h1>MẠNG LƯỚI ATVSV - DANH MỤC KIỂM TRA ATVSLĐ</h1>
        <p>Idemitsu Lubricants Vietnam</p>
      </header>

      <section class="user-info-grid">
        <div class="info-card">
          <span class="info-label">Họ tên</span>
          <strong id="displayHoTen">-</strong>
        </div>
        <div class="info-card">
          <span class="info-label">Email</span>
          <strong id="displayEmail">-</strong>
        </div>
        <div class="info-card">
          <span class="info-label">Tài khoản</span>
          <strong id="displayTaiKhoan">-</strong>
        </div>
        <div class="info-card">
          <span class="info-label">Khu vực</span>
          <strong id="displayKhuVuc">-</strong>
        </div>
      </section>

      <form id="checklistForm">
        <div id="questionsContainer"></div>

        <div class="submit-bar">
          <button type="submit" id="submitBtn" class="primary-btn full-btn">Gửi Báo Cáo</button>
        </div>
      </form>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="./script.js"></script>
</body>
</html>
