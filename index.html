<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E‑Checksheet ATVSV - Idemitsu</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<div id="pageLoader" class="page-loader hidden">
  <div class="loader-card">
    <div class="spinner"></div>
    <p id="pageLoaderText">Đang tải dữ liệu...</p>
  </div>
</div>

<main class="app-shell">

<!-- LOGIN / REGISTER -->
<section id="loginScreen" class="screen auth-screen">

<div class="auth-card">

<h1 class="auth-title">E‑Checksheet ATVSV</h1>
<p class="auth-subtitle">Idemitsu Lubricants Vietnam</p>

<div class="auth-switch">
<button id="showLoginTabBtn" class="switch-btn active">Đăng nhập</button>
<button id="showRegisterTabBtn" class="switch-btn">Đăng ký</button>
</div>


<!-- LOGIN -->

<div id="loginPanel" class="auth-panel active">

<form id="loginForm">

<div class="form-group">
<label>Email</label>
<input type="email" id="emailInput" required>
</div>

<div class="form-group">
<label>Mật khẩu</label>
<input type="password" id="passwordInput" required>
</div>

<button id="loginBtn" class="primary-btn">Đăng nhập</button>

</form>

</div>


<!-- REGISTER -->

<div id="registerPanel" class="auth-panel">

<form id="registerForm">

<div class="form-group">
<label>Email</label>
<input type="email" id="registerEmailInput" required>
</div>

<div class="form-group">
<label>Mật khẩu</label>
<input type="password" id="registerPasswordInput" required>
</div>

<div class="form-group">
<label>Xác nhận mật khẩu</label>
<input type="password" id="registerConfirmPasswordInput" required>
</div>

<div class="form-group">
<label>Tài khoản</label>
<input type="text" id="registerTaiKhoanInput" required>
</div>

<div class="form-group">
<label>Họ tên</label>
<input type="text" id="registerHoTenInput" required>
</div>


<div class="form-group">
<label>Khu vực</label>

<select id="registerKhuVucInput" required>

<option value="">-- chọn khu vực --</option>

<option value="Nhà máy">Nhà máy</option>

<option value="Chi nhánh">Chi nhánh</option>

</select>

</div>


<div class="form-group hidden" id="registerChiNhanhGroup">

<label>Chi nhánh</label>

<select id="registerChiNhanhInput">

<option value="">-- chọn chi nhánh --</option>

<option>Chi nhánh Hà Nội</option>

<option>Chi nhánh Hà Tĩnh</option>

<option>Chi nhánh Đà Nẵng</option>

<option>Chi nhánh Hồ Chí Minh</option>

<option>Chi nhánh Cần Thơ</option>

</select>

</div>


<button id="registerBtn" class="primary-btn">

Đăng ký tài khoản

</button>

</form>

</div>

</div>

</section>


<!-- CHECKLIST SCREEN -->

<section id="checklistScreen" class="screen hidden">

<div class="topbar">

<div>

<span class="topbar-tag">Hệ thống kiểm tra ATVSV</span>

</div>

<div class="topbar-right">

<a id="dashboardLink" href="./dashboard.html" class="ghost-btn hidden">

Dashboard

</a>

<a id="reportLink" href="./report.html" class="ghost-btn hidden">

Báo cáo

</a>

<a id="adminLink" href="./admin.html" class="ghost-btn hidden">

Quản lý Admin

</a>

<button id="logoutBtn" class="ghost-btn">

Đăng xuất

</button>

</div>

</div>



<header class="hero-card">

<h1>

MẠNG LƯỚI ATVSV

</h1>

<p>

Danh mục kiểm tra an toàn vệ sinh lao động

</p>

</header>



<section class="user-info-grid">

<div class="info-card">

<span class="info-label">Họ tên</span>

<strong id="displayHoTen">-</strong>

</div>


<div class="info-card">

<span class="info-label">Email</span>

<strong id="displayEmail">-</strong>

</div>


<div class="info-card">

<span class="info-label">Tài khoản</span>

<strong id="displayTaiKhoan">-</strong>

</div>


<div class="info-card">

<span class="info-label">Khu vực</span>

<strong id="displayKhuVuc">-</strong>

</div>


<div class="info-card">

<span class="info-label">Chi nhánh</span>

<strong id="displayChiNhanh">-</strong>

</div>

</section>


<form id="checklistForm">

<div id="questionsContainer"></div>

<div class="submit-bar">

<button id="submitBtn" class="primary-btn">

Gửi Báo Cáo

</button>

</div>

</form>

</section>

</main>


<div id="toast" class="toast hidden"></div>


<script type="module" src="./script.js"></script>

</body>

</html>
